server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: root-welcome
          uri: forward:///welcome
          predicates:
            - Path=/
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users,/api/users/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth,/api/auth/**
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/search,/api/search/**
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/messages,/api/messages/**
        - id: file-service
          uri: ${FILE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/files,/api/files/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
