server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/accounts?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

memcached:
  active:
    host: ${MEMCACHED_HOST:localhost}
    port: ${MEMCACHED_PORT:11211}
  standby:
    host: ${MEMCACHED_STANDBY_HOST:127.0.0.2}
    port: ${MEMCACHED_STANDBY_PORT:11211}

management:
  endpoints:
    web:
      exposure:
        include: health,info
